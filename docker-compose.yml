version: '3.8'
services:
  frontend:
    build:
      context: .
      args:
        VITE_API_URL: "${VITE_API_URL}"
        VITE_WHATSAPP_API_URL: "${VITE_WHATSAPP_API_URL}"
    container_name: pos_frontend
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - pos_network

networks:
  pos_network:
    external: true
